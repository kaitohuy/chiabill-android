name: chiabill
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  dio: ^5.9.2
  get: ^4.6.6
  get_storage: ^2.1.1
  google_sign_in: ^6.2.1
  flutter_dotenv: ^6.0.0
  image_picker: ^1.2.2
  fl_chart: ^1.2.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  app_links: ^7.0.0
  cached_network_image: ^3.4.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2
  flutter_image_compress: ^2.4.0
  url_launcher: ^6.3.2
  flutter_slidable: ^4.0.3
  google_maps_flutter: ^2.17.0
  photo_view: ^0.15.0
  gal: ^2.3.2
  math_expressions: ^3.1.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/launcher_icon.png"
  min_sdk_android: 21