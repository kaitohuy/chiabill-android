name: chiabill
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  dio: ^5.7.0
  get: ^4.6.6
  get_storage: ^2.1.1
  google_sign_in: ^6.2.1
  flutter_dotenv: ^6.0.0
  image_picker: ^1.2.1
  fl_chart: ^1.2.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_foreground.png"
  adaptive_icon_background: "assets/images/icon_background.png"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
  min_sdk_android: 26